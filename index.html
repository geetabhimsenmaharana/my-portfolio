<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Welcome</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="entry">

  <div class="entry-card">

    <div class="brand">GM</div>

    <h1 class="fade1">Welcome</h1>

    <p class="fade2">
      A small space for my work, experiments, and ideas.
    </p>

    <p class="hint fade2">
      Enter your name or continue anonymously.
    </p>

    <input
      id="visitorName"
      class="input fade3"
      type="text"
      placeholder="Your name (optional)"
    />

    <div class="buttons fade3">

      <button class="primary" onclick="saveVisitor()">
        Enter
      </button>

      <button class="secondary" onclick="skipVisitor()">
        Skip
      </button>

    </div>

    <div id="status" class="status"></div>

  </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-LrWfhyGX3fmXucsJG08svBRf4eyEPffAKLhLIoTFSWm1j2G87LPT4vzTLAJWHpYXDA/exec";

async function saveVisitor() {

  const name = document.getElementById("visitorName").value;

  document.getElementById("status").innerText = "Saving...";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name || "Anonymous",
        page: window.location.pathname
      })
    });

    const text = await res.text();
    console.log("Response:", text);

    document.getElementById("status").innerText = "Saved! Redirecting...";

  } catch (err) {
    console.log(err);
    document.getElementById("status").innerText = "Error saving data";
  }

  setTimeout(() => {
    window.location.href = "portfolio.html";
  }, 800);
}

function skipVisitor() {
  window.location.href = "portfolio.html";
}

</script>

</body>
</html>
